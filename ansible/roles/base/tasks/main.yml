---
- name: Install base packages
  ansible.builtin.dnf:
    name: 
      - qemu-guest-agent
      - chrony
      - golang-github-prometheus-node-exporter
      - vim
      - htop
      - iperf3
      - tmux
      - tree
      - bash-completion
      - bind-utils
      - net-tools

- name: Enable services (qemu, chronyd, node_exporter, firewalld)
  ansible.builtin.service:
    name:
      - qemu-guest-agent
      - chronyd
      - node_exporter
      - firewalld 
    state: started

  
  
