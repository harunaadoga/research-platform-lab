---

- name: Enable EPEL repository
  ansible.builtin.dnf:
    name: epel-release
    state: present 

- name: Install base packages
  ansible.builtin.dnf:
    name: 
      - qemu-guest-agent
      - chrony
      - vim
      - htop
      - iperf3
      - tmux
      - tree
      - bash-completion
      - bind-utils
      - net-tools
      - firewalld

- name: Enable and start services qemu-guest-agent
  ansible.builtin.service:
    name: qemu-guest-agent
    state: started
    enabled: true

- name: Enable and start chronyd
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true

- name: Enable and start firewalld
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: true
